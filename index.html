<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashta W 3asal | Order Online</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS Variables - Ashta W 3asal Identity */
        :root {
            --brand-yellow: #F4B41A;
            --brand-dark: #1A110B;
            --bg-light: #F9F8F6;
            --white: #FFFFFF;
            --text-main: #2A1D16;
            --text-muted: #7A6558;
            --border-color: #EAE3DA;
            --success: #27AE60;
            --danger: #E74C3C;
            --font-en: 'Montserrat', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
            --shadow-sm: 0 2px 8px rgba(26, 17, 11, 0.05);
            --shadow-md: 0 8px 24px rgba(26, 17, 11, 0.08);
            --radius-lg: 16px;
            --radius-md: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-light); font-family: var(--font-en); color: var(--text-main); padding-bottom: 90px; overflow-x: hidden; }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%; background-color: var(--brand-dark);
            display: flex; justify-content: space-between; align-items: center; padding: 10px 30px;
            z-index: 1000; box-shadow: var(--shadow-md);
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo img { height: 45px; border-radius: 5px; }
        .nav-contact { color: var(--brand-yellow); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px;}
        .nav-contact i { font-size: 16px; }

        /* Hero Section */
        .hero {
            margin-top: 65px; background: var(--brand-dark); color: var(--white);
            padding: 40px 20px; text-align: center; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(244,180,26,0.1) 0%, rgba(26,17,11,1) 70%); z-index: 1;
        }
        .hero-content { position: relative; z-index: 2; }
        .hero h1 { font-family: var(--font-ar); font-size: 2.5rem; color: var(--brand-yellow); margin-bottom: 10px; font-weight: 800;}
        .hero p { font-size: 0.95rem; color: #CCC; margin-bottom: 20px; font-weight: 300; display: flex; align-items: center; justify-content: center; gap: 8px;}
        
        /* Search Bar */
        .search-container { max-width: 500px; margin: 0 auto; position: relative; }
        .search-container input {
            width: 100%; padding: 14px 20px 14px 45px; border-radius: 30px; border: none;
            font-family: var(--font-en); font-size: 15px; outline: none; box-shadow: var(--shadow-md);
            transition: 0.3s;
        }
        .search-container input:focus { box-shadow: 0 0 0 3px rgba(244, 180, 26, 0.3); }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 16px; }

        /* Sticky Category Bar */
        .sticky-categories {
            position: sticky; top: 65px; background: var(--white); padding: 12px 20px;
            display: flex; overflow-x: auto; gap: 10px; z-index: 999;
            scrollbar-width: none; box-shadow: var(--shadow-sm); border-bottom: 1px solid var(--border-color);
        }
        .sticky-categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: transparent; border: 1px solid var(--border-color); padding: 8px 18px;
            border-radius: 20px; font-family: var(--font-en); font-size: 13px; font-weight: 600;
            color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn:hover { border-color: var(--brand-yellow); color: var(--brand-dark); }
        .cat-btn.active { background: var(--brand-yellow); color: var(--brand-dark); border-color: var(--brand-yellow); }

        /* Main Menu Container */
        .menu-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        /* Accordion Styling */
        .accordion-section { margin-bottom: 15px; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; border: 1px solid var(--border-color); }
        .accordion-header {
            padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; background: var(--white); transition: 0.3s;
        }
        .accordion-header:hover { background: #fdfdfd; }
        .accordion-title { font-size: 20px; font-weight: 700; color: var(--brand-dark); font-family: var(--font-en); }
        .accordion-icon { font-size: 18px; color: var(--brand-yellow); transition: transform 0.3s ease; }
        .accordion-content { display: none; padding: 0 25px 25px; background: var(--white); }
        .accordion-section.active .accordion-content { display: block; animation: fadeIn 0.4s ease; }
        .accordion-section.active .accordion-icon { transform: rotate(180deg); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid & Cards */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 15px; }
        .item-card {
            border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 18px;
            position: relative; display: flex; flex-direction: column; justify-content: space-between;
            transition: 0.3s; background: var(--white);
        }
        .item-card:hover { border-color: var(--brand-yellow); box-shadow: var(--shadow-sm); }
        
        .badge-new {
            position: absolute; top: -10px; right: -10px; background: var(--danger); color: var(--white);
            font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 12px;
            box-shadow: 0 2px 5px rgba(231,76,60,0.3); z-index: 2;
        }

        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .item-name { font-size: 16px; font-weight: 700; color: var(--brand-dark); line-height: 1.3; padding-right: 10px;}
        .item-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5; min-height: 18px;}
        
        /* Size Selectors */
        .size-selector { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;}
        .size-btn {
            background: var(--bg-light); border: 1px solid var(--border-color); padding: 5px 12px;
            border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: 0.2s;
        }
        .size-btn.active { background: var(--brand-dark); color: var(--brand-yellow); border-color: var(--brand-dark); }

        .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px dashed var(--border-color); padding-top: 12px;}
        .item-price { font-size: 18px; font-weight: 700; color: var(--brand-dark); }
        .add-btn {
            background: var(--brand-yellow); color: var(--brand-dark); border: none;
            width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 3px 8px rgba(244, 180, 26, 0.3);
        }
        .add-btn:hover { transform: scale(1.1); background: var(--brand-dark); color: var(--brand-yellow); }

        /* Modal / Product Details */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26,17,11,0.7); z-index: 2000; display: none;
            justify-content: center; align-items: flex-end; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: var(--white); width: 100%; max-width: 500px; max-height: 85vh;
            border-radius: 24px 24px 0 0; display: flex; flex-direction: column; position: relative;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { padding: 20px 25px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;}
        .modal-title-wrap h2 { font-size: 20px; color: var(--brand-dark); margin-bottom: 4px;}
        .modal-title-wrap p { font-size: 13px; color: var(--text-muted);}
        .close-modal { background: var(--bg-light); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; color: var(--brand-dark); font-size: 16px; transition: 0.2s;}
        .close-modal:hover { background: #EAE3DA; }

        .modal-body { padding: 25px; overflow-y: auto; flex: 1; }
        .note-section h4 { font-size: 14px; margin-bottom: 10px; color: var(--brand-dark); display: flex; align-items: center; gap: 8px;}
        .note-textarea {
            width: 100%; padding: 15px; border: 1px solid var(--border-color); border-radius: var(--radius-md);
            font-family: var(--font-en); font-size: 13px; resize: none; height: 80px; background: var(--bg-light);
        }
        .note-textarea:focus { outline: none; border-color: var(--brand-yellow); background: var(--white);}

        .modal-footer { padding: 20px 25px; border-top: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: var(--white); }
        .qty-control { display: flex; align-items: center; gap: 15px; background: var(--bg-light); padding: 5px 15px; border-radius: 30px; border: 1px solid var(--border-color);}
        .qty-btn { background: transparent; border: none; font-size: 18px; color: var(--brand-dark); cursor: pointer; padding: 5px;}
        .qty-val { font-weight: 700; font-size: 16px; min-width: 20px; text-align: center;}
        
        .modal-add-btn {
            flex: 1; margin-left: 20px; background: var(--brand-yellow); color: var(--brand-dark);
            border: none; padding: 14px; border-radius: 30px; font-weight: 700; font-size: 15px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 12px rgba(244,180,26,0.2);
        }
        .modal-add-btn:hover { background: var(--brand-dark); color: var(--brand-yellow); }

        /* Sticky Cart Bar */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--brand-dark);
            padding: 18px 30px; display: flex; justify-content: space-between; align-items: center;
            z-index: 998; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
        }
        .cart-bar.visible { transform: translateY(0); }
        .cart-info { display: flex; align-items: center; gap: 15px; color: var(--white); }
        .cart-badge { background: var(--brand-yellow); color: var(--brand-dark); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
        .cart-total { font-weight: 700; font-size: 18px; }
        .checkout-text { color: var(--brand-yellow); font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;}

        /* Checkout View */
        #checkout-view { display: none; max-width: 900px; margin: 90px auto 40px; padding: 0 20px; animation: fadeIn 0.4s ease;}
        .back-btn { background: transparent; border: none; font-size: 15px; font-weight: 600; color: var(--text-muted); cursor: pointer; margin-bottom: 25px; display: flex; align-items: center; gap: 8px; }
        .back-btn:hover { color: var(--brand-dark); }
        
        .checkout-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .checkout-box { background: var(--white); border-radius: var(--radius-lg); padding: 25px; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); margin-bottom: 25px;}
        .checkout-box h3 { font-size: 18px; color: var(--brand-dark); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--border-color); }
        
        .delivery-banner { background: rgba(244,180,26,0.1); border: 1px solid var(--brand-yellow); padding: 15px; border-radius: var(--radius-md); display: flex; align-items: center; gap: 15px; margin-bottom: 25px;}
        .delivery-banner i { font-size: 24px; color: var(--brand-yellow); }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-muted); }
        .form-input { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: var(--radius-md); font-family: var(--font-en); font-size: 14px; background: var(--bg-light); transition: 0.3s;}
        .form-input:focus { outline: none; border-color: var(--brand-yellow); background: var(--white); }
        
        .payment-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;}
        .pay-opt { display: flex; align-items: center; gap: 12px; padding: 15px; border: 1px solid var(--border-color); border-radius: var(--radius-md); cursor: pointer; transition: 0.2s;}
        .pay-opt:hover { border-color: var(--brand-yellow); }
        .pay-opt.selected { border-color: var(--brand-yellow); background: rgba(244,180,26,0.05); }
        .pay-opt input { accent-color: var(--brand-yellow); width: 18px; height: 18px;}
        
        .card-details { display: none; background: var(--bg-light); padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--border-color); margin-top: 10px; animation: fadeIn 0.3s ease;}
        .card-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .cart-item { display: flex; justify-content: space-between; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); }
        .item-details h4 { font-size: 14px; color: var(--brand-dark); margin-bottom: 4px; }
        .item-details p { font-size: 12px; color: var(--text-muted); }
        .item-note-text { font-size: 11px; color: var(--danger); font-style: italic; margin-top: 4px;}
        .cart-item-price { font-weight: 700; font-size: 14px;}
        
        .checkout-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 700; margin-top: 20px; color: var(--brand-dark); }
        .submit-btn { width: 100%; background: var(--success); color: var(--white); border: none; padding: 16px; border-radius: var(--radius-md); font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);}
        .submit-btn:hover { background: #219653; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .checkout-grid { grid-template-columns: 1fr; }
            .modal-content { max-height: 90vh; }
            .hero h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="nav-logo" onclick="toggleView('menu')">
            <img src="1001578310.png" alt="Ashta W 3asal Logo">
        </div>
        <div class="nav-contact">
            <i class="fas fa-phone-alt"></i> 76335033
        </div>
    </nav>

    <!-- Menu View -->
    <div id="menu-view">
        <header class="hero">
            <div class="hero-content">
                <h1>Ashta W 3asal</h1>
                <p><i class="fas fa-map-marker-alt"></i> Miniara Main Road, Near to alfa, Halba, Lebanon</p>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search for your favorite food..." onkeyup="searchMenu()">
                </div>
            </div>
        </header>

        <!-- Sticky Categories -->
        <div class="sticky-categories" id="cat-nav">
            <!-- Injected via JS -->
        </div>

        <div class="menu-container" id="menu-container">
            <!-- Accordions Injected via JS -->
        </div>
    </div>

    <!-- Checkout View -->
    <div id="checkout-view">
        <button class="back-btn" onclick="toggleView('menu')"><i class="fas fa-arrow-left"></i> Back to Menu</button>
        
        <div class="checkout-grid">
            <!-- Left: Form -->
            <div>
                <div class="delivery-banner">
                    <i class="fas fa-motorcycle"></i>
                    <div>
                        <div style="font-weight: 700; color: var(--brand-dark);">Estimated Delivery Time</div>
                        <div style="font-size: 13px; color: var(--text-muted);">Your order will arrive in 30 - 45 Minutes</div>
                    </div>
                </div>

                <div class="checkout-box">
                    <h3>Delivery Info</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-input" placeholder="Enter your name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" class="form-input" placeholder="e.g. 76 123 456">
                    </div>
                    <div class="form-group">
                        <label>Full Address</label>
                        <textarea class="form-input" placeholder="Street, Building, Floor..." style="height: 80px; resize: none;"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Delivery Notes (Optional)</label>
                        <textarea class="form-input" placeholder="e.g. Ring the bell, leave at door..." style="height: 60px; resize: none;"></textarea>
                    </div>
                </div>

                <div class="checkout-box">
                    <h3>Payment Method</h3>
                    <div class="payment-options">
                        <label class="pay-opt selected" onclick="selectPayment(this, 'cash')">
                            <input type="radio" name="payment" value="cash" checked>
                            <span><i class="fas fa-money-bill-wave" style="color:var(--success); width:25px;"></i> Cash on Delivery</span>
                        </label>
                        <label class="pay-opt" onclick="selectPayment(this, 'card_door')">
                            <input type="radio" name="payment" value="card_door">
                            <span><i class="fas fa-credit-card" style="color:#2980b9; width:25px;"></i> Card on Delivery</span>
                        </label>
                        <label class="pay-opt" onclick="selectPayment(this, 'online')">
                            <input type="radio" name="payment" value="online">
                            <span><i class="fas fa-globe" style="color:var(--brand-yellow); width:25px;"></i> Pay Online Now</span>
                        </label>
                    </div>

                    <div class="card-details" id="card-form">
                        <div class="form-group">
                            <label>Card Number</label>
                            <input type="text" class="form-input" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="card-row">
                            <div class="form-group">
                                <label>Expiry Date</label>
                                <input type="text" class="form-input" placeholder="MM/YY">
                            </div>
                            <div class="form-group">
                                <label>CVV</label>
                                <input type="text" class="form-input" placeholder="123">
                            </div>
                        </div>
                    </div>

                    <button class="submit-btn" onclick="submitOrder()">Place Order Now</button>
                </div>
            </div>

            <!-- Right: Summary -->
            <div style="position: sticky; top: 85px; align-self: start;">
                <div class="checkout-box">
                    <h3>Order Summary</h3>
                    <div id="checkout-items"></div>
                    <div class="checkout-total">
                        <span>Total</span>
                        <span id="checkout-total-val">0.00 $</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Options -->
    <div class="modal-overlay" id="options-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <h2 id="modal-title">Item Name</h2>
                    <p id="modal-size-text"></p>
                </div>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="note-section">
                    <h4><i class="fas fa-pen" style="color:var(--brand-yellow);"></i> Special Instructions</h4>
                    <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">Want to remove an ingredient or add a note?</p>
                    <textarea id="modal-note" class="note-textarea" placeholder="e.g. No onions, extra toasted..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <div class="qty-control">
                    <button class="qty-btn" onclick="changeQty(-1)"><i class="fas fa-minus" style="font-size:12px;"></i></button>
                    <span class="qty-val" id="modal-qty">1</span>
                    <button class="qty-btn" onclick="changeQty(1)"><i class="fas fa-plus" style="font-size:12px;"></i></button>
                </div>
                <button class="modal-add-btn" onclick="confirmAddToCart()">Add to Cart • <span id="modal-total-btn">0.00 $</span></button>
            </div>
        </div>
    </div>

    <!-- Sticky Cart -->
    <div class="cart-bar" id="cart-bar" onclick="toggleView('checkout')">
        <div class="cart-info">
            <div class="cart-badge" id="cart-count">0</div>
            <span class="cart-total" id="cart-total-bar">0.00 $</span>
        </div>
        <div class="checkout-text">Checkout <i class="fas fa-arrow-right"></i></div>
    </div>

    <script>
        // --- Data Structure ---
        const categoryList = [
            "Pizza", "Shawarma", "Pasta", "Platters", "Sandwiches", 
            "Special Sandwiches", "Starters", "Salads", "Burger", 
            "Potato", "Baguette", "Breakfast", "Kids Menu"
        ];

        // Processed data to combine sizes into single items
        const menuData = [
            // Shawarma
            { id:'sh1', cat:'Shawarma', name:'Sandwich Shawarma Djej', price:3.50 },
            { id:'sh2', cat:'Shawarma', name:'Sandwich Shawarma Lahme', price:4.00 },
            { id:'sh3', cat:'Shawarma', name:'Sand Shaw Djej w Jebne', price:4.00 },
            { id:'sh4', cat:'Shawarma', name:'Sand Shaw Lahme w Jebne', price:4.50 },
            { id:'sh5', cat:'Shawarma', name:'Rizo Djej', desc:'Rice + shawarma + sauce', price:5.00 },
            { id:'sh6', cat:'Shawarma', name:'Rizo Lahme', desc:'Rice + shawarma + sauce', price:6.00 },
            { id:'sh7', cat:'Shawarma', name:'Shawarma Djej 3al Batata', price:5.00 },
            { id:'sh8', cat:'Shawarma', name:'Shawarma Lahme 3al Batata', price:6.20 },
            
            // Pizza (Grouped by sizes)
            { id:'pz1', cat:'Pizza', name:'Vegetarian Pizza', desc:'Tomato, olive, sweet pepper, mushroom, cheese', sizes:{S:6.00, M:7.50, L:10.00, F:13.00} },
            { id:'pz2', cat:'Pizza', name:'Margarita Pizza', desc:'Sauce, cheese, basil', sizes:{S:5.00, M:6.50, L:9.00, F:12.00} },
            { id:'pz3', cat:'Pizza', name:'Lebanese Pizza', desc:'Cheese, mushroom, janbon, sweet pepper, olive', sizes:{S:6.50, M:8.50, L:11.00, F:15.00} },
            { id:'pz4', cat:'Pizza', name:'Four Cheese Pizza', desc:'Four kinds of cheese', sizes:{S:7.00, M:9.00, L:11.50, F:14.50} },

        let cart = [];
        let tempItem = null; // Stores item being configured in modal

        // --- Initialization ---
        window.onload = () => {
            renderNav();
            renderMenu();
        };

        function getSafeId(str) { return str.replace(/\s+/g, '-').toLowerCase(); }

        // Render Sticky Nav
        function renderNav() {
            const nav = document.getElementById('cat-nav');
            nav.innerHTML = categoryList.map((cat, idx) => `
                <button class="cat-btn ${idx===0 ? 'active':''}" onclick="scrollToCat('${cat}', this)">${cat}</button>
            `).join('');
        }

        // Render Menu (Accordions + Grids)
        function renderMenu() {
            const container = document.getElementById('menu-container');
            let html = '';
            
            categoryList.forEach(cat => {
                const items = menuData.filter(i => i.cat === cat);
                if(items.length > 0) {
                    html += `
                    <div class="accordion-section" id="sec-${getSafeId(cat)}">
                        <div class="accordion-header" onclick="toggleAccordion('sec-${getSafeId(cat)}')">
                            <span class="accordion-title">${cat}</span>
                            <i class="fas fa-chevron-down accordion-icon"></i>
                        </div>
                        <div class="accordion-content">
                            <div class="menu-grid">
                                ${items.map(item => generateCard(item)).join('')}
                            </div>
                        </div>
                    </div>`;
                }
            });
            container.innerHTML = html;
        }

        function generateCard(item) {
            const badge = item.isNew ? `<div class="badge-new">NEW</div>` : '';
            const desc = item.desc ? `<div class="item-desc">${item.desc}</div>` : `<div class="item-desc"></div>`;
            
            let priceHtml = '';
            let defaultPrice = 0;
            let defaultSize = '';

            if(item.sizes) {
                // Size options
                const keys = Object.keys(item.sizes);
                defaultSize = keys[0];
                defaultPrice = item.sizes[defaultSize];
                
                let sizeBtns = keys.map(k => `
                    <button class="size-btn ${k===defaultSize?'active':''}" onclick="event.stopPropagation(); changeCardSize(this, '${item.id}', '${k}', ${item.sizes[k]})">${k}</button>
                `).join('');
                
                priceHtml = `
                    <div class="size-selector">${sizeBtns}</div>
                    <div class="item-footer">
                        <span class="item-price" id="price-${item.id}">${defaultPrice.toFixed(2)} $</span>
                        <button class="add-btn" onclick="event.stopPropagation(); openModal('${item.id}')"><i class="fas fa-plus"></i></button>
                    </div>`;
            } else {
                defaultPrice = item.price;
                priceHtml = `
                    <div class="item-footer">
                        <span class="item-price">${defaultPrice.toFixed(2)} $</span>
                        <button class="add-btn" onclick="event.stopPropagation(); openModal('${item.id}')"><i class="fas fa-plus"></i></button>
                    </div>`;
            }

            return `
            <div class="item-card" onclick="openModal('${item.id}')" data-item-id="${item.id}" data-current-price="${defaultPrice}" data-current-size="${defaultSize}">
                ${badge}
                <div class="item-header">
                    <span class="item-name">${item.name}</span>
                </div>
                ${desc}
                ${priceHtml}
            </div>`;
        }

        // Accordion & Scrolling Logic
        function toggleAccordion(id) {
            const el = document.getElementById(id);
            el.classList.toggle('active');
        }

        function scrollToCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const targetId = `sec-${getSafeId(cat)}`;
            const target = document.getElementById(targetId);
            if(target) {
                target.classList.add('active'); // Auto open
                const y = target.getBoundingClientRect().top + window.scrollY - 130;
                window.scrollTo({top: y, behavior: 'smooth'});
            }
        }

        // Search Logic
        function searchMenu() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const sections = document.querySelectorAll('.accordion-section');
            
            sections.forEach(sec => {
                const cards = sec.querySelectorAll('.item-card');
                let hasMatch = false;
                
                cards.forEach(card => {
                    const name = card.querySelector('.item-name').innerText.toLowerCase();
                    if(name.includes(input)) {
                        card.style.display = 'flex';
                        hasMatch = true;
                    } else {
                        card.style.display = 'none';
                    }
                });

                if(hasMatch && input !== '') {
                    sec.classList.add('active');
                    sec.style.display = 'block';
                } else if (!hasMatch && input !== '') {
                    sec.style.display = 'none';
                } else {
                    sec.style.display = 'block';
                    sec.classList.remove('active'); // reset
                }
            });
        }

        // Card Size Selection
        function changeCardSize(btn, id, size, price) {
            const card = document.querySelector(`.item-card[data-item-id="${id}"]`);
            card.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById(`price-${id}`).innerText = `${price.toFixed(2)} $`;
            card.setAttribute('data-current-price', price);
            card.setAttribute('data-current-size', size);
        }

        // Modal Logic
        function openModal(id) {
            const item = menuData.find(i => i.id === id);
            const card = document.querySelector(`.item-card[data-item-id="${id}"]`);
            
            let price = parseFloat(card.getAttribute('data-current-price'));
            let size = card.getAttribute('data-current-size');

            tempItem = { ...item, finalPrice: price, finalSize: size, qty: 1 };

            document.getElementById('modal-title').innerText = item.name;
            document.getElementById('modal-size-text').innerText = size ? `Size: ${size}` : '';
            document.getElementById('modal-note').value = '';
            document.getElementById('modal-qty').innerText = '1';
            updateModalPrice();

            document.getElementById('options-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('options-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function changeQty(val) {
            if(tempItem.qty + val > 0) {
                tempItem.qty += val;
                document.getElementById('modal-qty').innerText = tempItem.qty;
                updateModalPrice();
            }
        }

        function updateModalPrice() {
            let total = tempItem.finalPrice * tempItem.qty;
            document.getElementById('modal-total-btn').innerText = `${total.toFixed(2)} $`;
        }

        // Cart Logic
        function confirmAddToCart() {
            tempItem.note = document.getElementById('modal-note').value.trim();
            cart.push({...tempItem});
            updateCart();
            closeModal();
        }

        function updateCart() {
            const bar = document.getElementById('cart-bar');
            if(cart.length > 0) {
                let qty = cart.reduce((s, i) => s + i.qty, 0);
                let total = cart.reduce((s, i) => s + (i.finalPrice * i.qty), 0);
                document.getElementById('cart-count').innerText = qty;
                document.getElementById('cart-total-bar').innerText = `${total.toFixed(2)} $`;
                bar.classList.add('visible');
            } else {
                bar.classList.remove('visible');
            }
        }

        // Checkout & Views Logic
        function toggleView(view) {
            if(view === 'checkout') {
                document.getElementById('menu-view').style.display = 'none';
                document.getElementById('cart-bar').classList.remove('visible');
                document.getElementById('checkout-view').style.display = 'block';
                window.scrollTo(0,0);
                renderCheckout();
            } else {
                document.getElementById('checkout-view').style.display = 'none';
                document.getElementById('menu-view').style.display = 'block';
                updateCart();
                window.scrollTo(0,0);
            }
        }

        function renderCheckout() {
            const list = document.getElementById('checkout-items');
            let html = '';
            let grandTotal = 0;

            cart.forEach(item => {
                let itemTotal = item.finalPrice * item.qty;
                grandTotal += itemTotal;
                let subtitle = item.finalSize ? `Size: ${item.finalSize}` : '';
                
                html += `
                <div class="cart-item">
                    <div class="item-details">
                        <h4>${item.qty}x ${item.name}</h4>
                        <p>${subtitle}</p>
                        ${item.note ? `<div class="item-note-text"><i class="fas fa-comment-alt"></i> ${item.note}</div>` : ''}
                    </div>
                    <div class="cart-item-price">${itemTotal.toFixed(2)} $</div>
                </div>`;
            });
            list.innerHTML = html;
            document.getElementById('checkout-total-val').innerText = `${grandTotal.toFixed(2)} $`;
        }

        function selectPayment(labelEl, type) {
            document.querySelectorAll('.pay-opt').forEach(el => el.classList.remove('selected'));
            labelEl.classList.add('selected');
            document.getElementById('card-form').style.display = (type === 'online') ? 'block' : 'none';
        }

        function submitOrder() {
            if(cart.length === 0) return;
            const method = document.querySelector('input[name="payment"]:checked').value;
            if(method === 'online') {
                alert("Processing Secure Payment... Order Placed Successfully! 🍯 Ashta W 3asal thanks you.");
            } else {
                alert("Order Placed Successfully! 🍯 Will be delivered in 30-45 mins.");
            }
            cart = [];
            toggleView('menu');
        }
